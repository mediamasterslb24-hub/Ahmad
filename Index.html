<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Ahmad</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* القلب */
.heart-svg {
  width: 250px;
}

/* رسم القلب */
#heartPath {
  fill: transparent;
  stroke: red;
  stroke-width: 4;
  stroke-dasharray: 500;
  stroke-dashoffset: 500;
  animation: draw 2s ease forwards, fillHeart 1s ease forwards 2s, beat 1s infinite 3s;
}

/* يرسم */
@keyframes draw {
  to { stroke-dashoffset: 0; }
}

/* يتعبّى */
@keyframes fillHeart {
  to { fill: red; }
}

/* ينبض */
@keyframes beat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* الاسم */
#name {
  color: white;
  font-size: 40px;
  margin-top: 20px;
  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
}
</style>

</head>

<body>

<svg viewBox="0 0 200 200" class="heart-svg">
  <path id="heartPath"
    d="M100 170 
       C 20 100, 20 40, 100 60 
       C 180 40, 180 100, 100 170"/>
</svg>

<h1 id="name"></h1>

<script>
const text = "Ahmad ❤️";
let i = 0;

const nameEl = document.getElementById("name");

setTimeout(() => {
  const interval = setInterval(() => {
    if (i < text.length) {
      nameEl.textContent += text[i];
      i++;
    } else {
      clearInterval(interval);
    }
  }, 150);
}, 3000);
</script>

</body>
</html>
